// 1. Establece la fecha y hora final (Formato: Mes Día, Año HH:MM:SS)
const countDownDate = new Date("Mar 22, 2026 18:00:00").getTime();

// 2. Actualiza el contador cada 1 segundo
const x = setInterval(function() {

  // Obtiene la fecha y hora actual
  const now = new Date().getTime();

  // Encuentra la distancia entre "ahora" y la fecha objetivo
  const distance = countDownDate - now;

  // Cálculos de tiempo para días, horas, minutos y segundos
  const days = Math.floor(distance / (1000 * 60 * 60 * 24));
  const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
  const seconds = Math.floor((distance % (1000 * 60)) / 1000);

  // Muestra el resultado en un elemento con id="timer" (o en la consola)
  document.getElementById("contador").innerHTML = `${days}días ${hours}h ${minutes}m ${seconds}s`;
  //console.log(`${days}dias ${hours}h ${minutes}m ${seconds}s`);

  // Si la cuenta regresiva termina, escribe un texto
  if (distance < 0) {
    clearInterval(x);
    console.log("¡TIEMPO AGOTADO!");
  }
}, 1000);
